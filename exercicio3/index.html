<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Semântico</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <section class="posts">

            <article class="post im1">
                <header class="post-header">
                    <h2>The winter of my discontent</h2>
                </header>
                <figure>
                    <img src="https://picsum.photos/seed/picsum1/600/400"
                         alt="Paisagem fria representando inverno">
                </figure>
            </article>

            <article class="post im2">
                <header class="post-header">
                    <h2>Instagram is toxic but I keep posting</h2>
                </header>
                <figure>
                    <img src="https://picsum.photos/seed/picsum2/600/400"
                         alt="Imagem representando redes sociais">
                </figure>
            </article>

            <article class="post im3">
                <header class="post-header">
                    <h2>Throwing my phone into the ocean</h2>
                </header>
                <figure>
                    <img src="https://picsum.photos/seed/picsum3/600/400"
                         alt="Imagem representando oceano">
                </figure>
            </article>

            <article class="post im4">
                <header class="post-header">
                    <h2>I'm never leaving my room</h2>
                </header>
                <figure>
                    <img src="https://picsum.photos/seed/picsum4/600/400"
                         alt="Imagem representando quarto escuro">
                </figure>
            </article>

        </section>
    </main>

</body>

</html>
